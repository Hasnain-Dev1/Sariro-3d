<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Sun gradient: amber gold → coral orange -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Soft sun glow behind the S -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Navy chip with rounded corners (matches site bg #0F172A) -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0F172A"/>

  <!-- Sun glow halo behind the S -->
  <circle cx="50" cy="52" r="44" fill="url(#sunGlow)"/>

  <!-- Bold "S" letter rendered in sun gradient -->
  <text
    x="50" y="75"
    font-family="Arial Black, Helvetica, sans-serif"
    font-size="74"
    font-weight="900"
    fill="url(#sunGrad)"
    text-anchor="middle"
    letter-spacing="-2"
  >S</text>

  <!-- Tiny white </> at top-right (the AI/code hint) -->
  <text
    x="80" y="27"
    font-family="ui-monospace, 'SF Mono', Menlo, monospace"
    font-size="13"
    font-weight="bold"
    fill="#FFFFFF"
    text-anchor="middle"
  >&lt;/&gt;</text>
</svg>
